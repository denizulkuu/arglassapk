name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip project
        run: |
          unzip -o ARGlassesSender.zip
          # Klasör yapısını kontrol etmek için terminale yazdırıyoruz
          ls -R
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6
          
      - name: Find and Build APK
        run: |
          # settings.gradle dosyasının olduğu gerçek klasörü bul ve oraya geç
          GRADLE_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          echo "Gradle projesi burada bulundu: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          gradle assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
