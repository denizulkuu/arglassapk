name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract project
        run: |
          unzip "*.zip" -d project

      - name: Find gradlew
        run: |
          cd project
          if [ -f gradlew ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          else
            DIR=$(find . -name gradlew | head -n1 | xargs dirname)
            echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: |
          cd project/${{ env.PROJECT_DIR }}
          chmod +x gradlew

      - name: Build APK
        run: |
          cd project/${{ env.PROJECT_DIR }}
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: project/**/app/build/outputs/apk/debug/*.apk
